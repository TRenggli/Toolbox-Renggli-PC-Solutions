name: CI Smoke Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Validate bash syntax
        shell: bash
        run: |
          set -euo pipefail
          bash -n Linux/toolbox.sh
          bash -n Linux/toolbox_corporate.sh
          bash -n Mac/toolbox.sh
          bash -n Mac/toolbox_corporate.sh

      - name: Enforce no-log exit routing
        shell: bash
        run: |
          set -euo pipefail
          rg -n 'if "%choice%"=="00" goto :EXIT_NO_LOG' Windows/toolbox.bat Windows/toolbox_corporate.bat
          rg -n '00\) exit_no_log ;;' Linux/toolbox.sh Linux/toolbox_corporate.sh Mac/toolbox.sh Mac/toolbox_corporate.sh

      - name: Block known checksum regression (Windows)
        shell: bash
        run: |
          set -euo pipefail
          if rg -n 'skip=3 tokens=\*" %%a in \(' Windows/toolbox.bat Windows/toolbox_corporate.bat; then
            echo "Found deprecated hash parsing pattern with skip=3"
            exit 1
          fi
          rg -n 'Get-FileHash' Windows/toolbox.bat Windows/toolbox_corporate.bat

      - name: Ensure shutdown cleanup is scoped to Toolbox-owned tasks
        shell: bash
        run: |
          set -euo pipefail
          if rg -n 'grep -rl "shutdown" /etc/cron.d|grep -rl "shutdown" /Library/LaunchDaemons|sed -i.*/shutdown/d' Linux/*.sh Mac/*.sh; then
            echo "Found global shutdown cleanup pattern"
            exit 1
          fi

      - name: Check docs for exit option consistency
        shell: bash
        run: |
          set -euo pipefail
          rg -n '\[00\].*SIN REPORTE Y SIN LOG' Manuales/README_ES.md
          rg -n '\*\*00\*\* = exit without report and without log' Manuales/README_EN.md
          rg -n '\[00\].*EXIT WITHOUT REPORT AND WITHOUT LOG' Manuales/README_EN.md
          rg -n '\[00\].*退出不生成报告且不保留日志|\*\*00\*\* = 退出不生成报告且不保留日志' Manuales/README_CN.md
          rg -n 'macOS: 14 módulos' Manuales/README_ES.md
          rg -n 'macOS: 14 modules' Manuales/README_EN.md
          rg -n 'macOS: 14 个模块' Manuales/README_CN.md
          if rg -n '30 opciones adaptadas para macOS|30 options adapted for macOS|30 个针对 macOS 优化的选项|macOS: 30 módulos|macOS: 30 modules|macOS: 30 个模块' Manuales/README_ES.md Manuales/README_EN.md Manuales/README_CN.md; then
            echo "Found outdated macOS 30-option wording in docs"
            exit 1
          fi

      - name: Check root README path and log consistency
        shell: bash
        run: |
          set -euo pipefail
          if rg -n 'Manuals/' README.md; then
            echo "Found legacy Manuals/ path in README.md"
            exit 1
          fi
          rg -n 'Manuales/' README.md
          rg -n 'Windows: Windows/Logs/' README.md
          rg -n 'Linux: Linux/Logs/' README.md
          rg -n 'macOS: Mac/Logs/' README.md
